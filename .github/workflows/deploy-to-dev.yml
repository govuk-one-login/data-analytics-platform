name: ✳️ Deploy to the dev environment (DONT USE)

on:
  push:
    branches:
      - dpt-2176

jobs:
  test-and-validate:
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    uses: ./.github/workflows/test-and-validate.yml

  check-core-iac-changes:
    runs-on: ubuntu-latest
    outputs:
      core-iac-changed: ${{ steps.changes.outputs.core }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
        with:
          fetch-depth: 0
      - name: Check for changes to core iac
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3
        id: changes
        with:
          filters: |
            core:
              - 'iac/core/**'

  deploy-to-dev:
    needs: [test-and-validate, check-core-iac-changes]
    # These permissions are needed to interact with GitHub's OIDC Token endpoint (enabling the aws-actions/configure-aws-credentials action)
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    uses: ./.github/workflows/deploy-to-aws.yml
    with:
      core-iac-changed: ${{ needs.check-core-iac-changes.outputs.core-iac-changed }}
      environment: DEV

  upload-athena-files:
    if: inputs.skip-s3-upload != true
    # These permissions are needed to interact with GitHub's OIDC Token endpoint (enabling the aws-actions/configure-aws-credentials action)
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    uses: ./.github/workflows/upload-athena-files.yml
    with:
      environment: DEV
