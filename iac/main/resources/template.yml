  StatemachineFailuerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: ELT State Machine Failure EventRule Trigger
      EventPattern:
        source:
        - aws.states
        detail-type:
        - Step Functions Execution Status Change
        detail:
          status:
          - FAILED
          - ABORTED
          - TIMED_OUT
      State: ENABLED
      Targets:
      - Arn:
          Ref: SNSAlertTopic
        Id: SendToSnsTopic
        InputTransformer:
          InputPathsMap:
            executionArn: $.detail.executionArn
            startDate: $.time
            stateMachineArn: $.detail.stateMachineArn
            status: $.detail.status
          InputTemplate: "{\n    \"version\": \"1.0\",\n    \"source\": \"custom\"\
            ,\n    \"id\": \"elt_step_function_alert\",\n    \"content\": {\n    \
            \  \"textType\": \"client-markdown\",\n      \"title\": \":Alert: ELT\
            \ Step Function Failure Alert\",\n      \"description\": \"ELT step function\
            \ process has failed, please review failed process.\",\n      \"nextSteps\"\
            : [\n        \"stateMachineArn <stateMachineArn>\",\n        \"executionArn:\
            \ <executionArn>\",\n        \"status: <status>\",\n        \"startDate:\
            \ <startDate>\",\n        \"DAP team please review!\"\n      ],\n    \
            \  \"keywords\": [\n        \"ELT Step Function failure alert\",\n   \
            \     \"Warning\",\n        \"Review action required\"\n      ]\n    }\n\
            \  }"
    Metadata:
      SamResourceId: StatemachineFailuerEventRule
