AWSTemplateFormatVersion: '2010-09-09'
Description: Data and Analytics Stack
Transform: AWS::Serverless-2016-10-31
Outputs:
  TXMAQueueURL:
    Description: TxMA queue URL
    Value:
      Fn::If:
      - UsePlaceholderTxMAQueue
      - Ref: EventConsumerQueue
      - ''
  TXMABucket:
    Description: Name of raw bucket
    Value:
      Ref: RawLayerBucket
Parameters:
  Environment:
    Description: Environment type
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - build
    - staging
    - integration
    - production
    - production-preview
  CodeSigningConfigArn:
    Description: ARN of Code Signing Config from deployment pipeline
    Type: String
    Default: none
  PermissionsBoundary:
    Description: ARN of permissions boundary for new roles
    Type: String
    Default: none
  DeliveryStreamName:
    Description: Kinesis Firehose delivery stream name
    Type: String
    Default: dap-txma-delivery-stream
  RawGlueDatabaseName:
    Default: txma-raw
    Type: String
    Description: Name for the TxMA Raw Glue database
  StageGlueDatabaseName:
    Default: txma-stage
    Type: String
    Description: Name for the TxMA Stage Glue database
  BuildAccountId:
    Default: 991664831801
    Type: String
    Description: Account number of the build account used to grant it S3 access in
      other accounts
    AllowedValues:
    - 991664831801
  TestRoleArn:
    Type: String
    Description: The ARN of the role that will used by secure pipelines to run integration
      tests
    Default: none
    AllowedPattern: (none)|(arn:aws:iam::.*:role/.*)
  RedshiftSecretLength:
    Type: Number
    Description: Length of the redshift password stored in secretsmanager
    Default: 16
  RedshiftSecretExcludeCharacters:
    Type: String
    Description: String of characters to exclude from the redshift password stored
      in secretsmanager
    Default: '"''@/\'
  CrossAccountDataSyncRoleName:
    Type: String
    Description: Name of the role allowing cross account data sync
    Default: dap-cross-account-data-sync-role
    AllowedValues:
    - dap-cross-account-data-sync-role
Conditions:
  UseCodeSigning:
    Fn::Not:
    - Fn::Equals:
      - Ref: CodeSigningConfigArn
      - none
  UsePermissionsBoundary:
    Fn::Not:
    - Fn::Equals:
      - Ref: PermissionsBoundary
      - none
  UseTestingContainers:
    Fn::Not:
    - Fn::Equals:
      - Ref: TestRoleArn
      - none
  IsDev:
    Fn::Equals:
    - Ref: Environment
    - dev
  IsBuild:
    Fn::Equals:
    - Ref: Environment
    - build
  IsIntegration:
    Fn::Equals:
    - Ref: Environment
    - integration
  IsStaging:
    Fn::Equals:
    - Ref: Environment
    - staging
  IsProduction:
    Fn::Equals:
    - Ref: Environment
    - production
  IsProductionPreview:
    Fn::Equals:
    - Ref: Environment
    - production-preview
  IsQuicksightEnvironment:
    Fn::Or:
    - Condition: IsDev
    - Condition: IsProduction
    - Condition: IsProductionPreview
  IsCrossAccountDataSyncEnvironment:
    Fn::Or:
    - Condition: IsStaging
    - Condition: IsProductionPreview
  UsePlaceholderTxMAQueue:
    Fn::Or:
    - Condition: IsStaging
    - Condition: IsBuild
    - Condition: IsProductionPreview
  IsSecurePipelinesEnvironment:
    Fn::Not:
    - Condition: IsProductionPreview
  IsManualReferenceDataEnvironment:
    Fn::Or:
    - Condition: IsProduction
    - Condition: IsProductionPreview
  IsADMEnvironment:
    Fn::Or:
    - Condition: IsProduction
    - Condition: IsProductionPreview
Globals:
  Function:
    CodeSigningConfigArn:
      Fn::If:
      - UseCodeSigning
      - Ref: CodeSigningConfigArn
      - Ref: AWS::NoValue
    PermissionsBoundary:
      Fn::If:
      - UsePermissionsBoundary
      - Ref: PermissionsBoundary
      - Ref: AWS::NoValue
    Runtime: nodejs18.x
    Timeout: 30
    CodeUri: dist/
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
Resources:
  AthenaWorkgroupBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketName:
        Fn::Sub: ${Environment}-dap-athena-workgroup
      LoggingConfiguration:
        DestinationBucketName:
          Ref: GlobalLogBucket
        LogFilePrefix: dap-athena-workgroup/log
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
        - ExpirationInDays: 365
          Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
    Metadata:
      SamResourceId: AthenaWorkgroupBucket
  AthenaWorkgroupBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: AthenaWorkgroupBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Deny
          Action: s3:*
          Resource:
            Fn::Sub: ${AthenaWorkgroupBucket.Arn}/*
          Principal: '*'
          Condition:
            Bool:
              aws:SecureTransport: false
        - Effect: Allow
          Action:
          - s3:Get*
          - s3:Put*
          - s3:List*
          - s3:ListBucketMultipartUploads
          - s3:AbortMultipartUpload
          - s3:ListBucket
          - s3:GetBucketLocation
          - s3:ListMultipartUploadParts
          Resource:
          - Fn::Sub: ${AthenaWorkgroupBucket.Arn}
          - Fn::Sub: ${AthenaWorkgroupBucket.Arn}/*
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
    Metadata:
      SamResourceId: AthenaWorkgroupBucketPolicy
  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name:
        Fn::Sub: ${Environment}-dap-txma-processing
      Description: DAP project
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: false
        RequesterPaysEnabled: true
        ResultConfiguration:
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
          OutputLocation:
            Fn::Sub: s3://${AthenaWorkgroupBucket}/txma/
    Metadata:
      SamResourceId: AthenaWorkGroup
  AthenaGetConfigLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: athena-get-config-${Environment}
      Handler: athena-get-config.handler
      Policies:
      - AWSLambdaBasicExecutionRole
      - Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          - s3:ListBucket
          Resource:
            Fn::Sub: arn:aws:s3:::${Environment}-dap-elt-metadata/*
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          ENVIRONMENT:
            Ref: Environment
      Tags:
        Environment:
          Ref: Environment
      VpcConfig:
        SecurityGroupIds:
        - Ref: LambdaSecurityGroup
        SubnetIds:
        - Ref: SubnetForDAP1
        - Ref: SubnetForDAP2
        - Ref: SubnetForDAP3
      CodeUri: s3://secure-pipelines-pipelin-githubartifactsourcebuck-i3f1tk1mewia/cd9ae21a8e99751113af879985ccfdaf.zip/signed_b083b299-881a-42a6-8326-77e8e468afb0.zip
    Metadata:
      SamResourceId: AthenaGetConfigLambda
  AthenaGetStatementLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: athena-get-statement-${Environment}
      Handler: athena-get-statement.handler
      Policies:
      - AWSLambdaBasicExecutionRole
      - Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          - s3:ListBucket
          Resource:
            Fn::Sub: arn:aws:s3:::${Environment}-dap-elt-metadata/*
      ReservedConcurrentExecutions: 30
      Environment:
        Variables:
          ENVIRONMENT:
            Ref: Environment
      Tags:
        Environment:
          Ref: Environment
      VpcConfig:
        SecurityGroupIds:
        - Ref: LambdaSecurityGroup
        SubnetIds:
        - Ref: SubnetForDAP1
        - Ref: SubnetForDAP2
        - Ref: SubnetForDAP3
      CodeUri: s3://secure-pipelines-pipelin-githubartifactsourcebuck-i3f1tk1mewia/cd9ae21a8e99751113af879985ccfdaf.zip/signed_73314943-a5ad-4214-8df9-5def70202659.zip
    Metadata:
      SamResourceId: AthenaGetStatementLambda
  DAPAnalystsFilesBucket:
    Type: AWS::S3::Bucket
    Condition: IsQuicksightEnvironment
    Properties:
      AccessControl: Private
      BucketName:
        Fn::Sub: ${Environment}-dap-analysts-files
      LoggingConfiguration:
        DestinationBucketName:
          Ref: GlobalLogBucket
        LogFilePrefix: dap-analysts-assets/log
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
    Metadata:
      SamResourceId: DAPAnalystsFilesBucket
  DAPAnalystsFilesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsQuicksightEnvironment
    Properties:
      Bucket:
        Ref: DAPAnalystsFilesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowCloudFrontServicePrincipal
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${DAPAnalystsFilesBucket}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
        - Sid: DenyNonSecureTransport
          Effect: Deny
          Principal: '*'
          Action: s3:*
          Resource:
            Fn::Sub: arn:aws:s3:::${DAPAnalystsFilesBucket}/*
          Condition:
            Bool:
              aws:SecureTransport: 'false'
    Metadata:
      SamResourceId: DAPAnalystsFilesBucketPolicy
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: IsQuicksightEnvironment
    Properties:
      OriginAccessControlConfig:
        Name: dapanalystsoac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
    Metadata:
      SamResourceId: OriginAccessControl
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: IsQuicksightEnvironment
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
        - DomainName:
            Fn::GetAtt:
            - DAPAnalystsFilesBucket
            - DomainName
          Id: S3Origin
          S3OriginConfig: {}
          OriginAccessControlId:
            Ref: OriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
          - GET
          - HEAD
          CachedMethods:
          - GET
          - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
    Metadata:
      SamResourceId: CloudFrontDistribution
  ShieldProtection:
    Type: AWS::Shield::Protection
    Condition: IsQuicksightEnvironment
    Properties:
      Name: ShieldProtectionForCDN
      ResourceArn:
        Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
          - E3001
      SamResourceId: ShieldProtection
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Condition: IsQuicksightEnvironment
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment:
          Fn::Sub: OAI for ${DAPAnalystsFilesBucket}
    Metadata:
      SamResourceId: CloudFrontOAI
  CrossAccountVPC:
    Type: AWS::EC2::VPC
    Condition: IsProduction
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
      - Key: Environment
        Value:
          Ref: Environment
      - Key: Name
        Value: dap-cross-account-vpc
    Metadata:
      SamResourceId: CrossAccountVPC
  CrossAccountSubnet1:
    Type: AWS::EC2::Subnet
    Condition: IsProduction
    Properties:
      VpcId:
        Ref: CrossAccountVPC
      AvailabilityZone:
        Fn::Select:
        - 0
        - Fn::GetAZs:
            Ref: AWS::Region
      CidrBlock: 10.0.1.0/24
      Tags:
      - Key: Environment
        Value:
          Ref: Environment
      - Key: Name
        Value: dap-cross-account-subnet-1
    Metadata:
      SamResourceId: CrossAccountSubnet1
  CrossAccountSubnet2:
    Type: AWS::EC2::Subnet
    Condition: IsProduction
    Properties:
      VpcId:
        Ref: CrossAccountVPC
      AvailabilityZone:
        Fn::Select:
        - 1
        - Fn::GetAZs:
            Ref: AWS::Region
      CidrBlock: 10.0.2.0/24
      Tags:
      - Key: Environment
        Value:
          Ref: Environment
      - Key: Name
        Value: dap-cross-account-subnet-2
    Metadata:
      SamResourceId: CrossAccountSubnet2
  CrossAccountSubnet3:
    Type: AWS::EC2::Subnet
    Condition: IsProduction
    Properties:
      VpcId:
        Ref: CrossAccountVPC
      AvailabilityZone:
        Fn::Select:
        - 2
        - Fn::GetAZs:
            Ref: AWS::Region
      CidrBlock: 10.0.3.0/24
      Tags:
      - Key: Environment
        Value:
          Ref: Environment
      - Key: Name
        Value: dap-cross-account-subnet-3
    Metadata:
      SamResourceId: CrossAccountSubnet3
  CrossAccountRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: IsProduction
    Properties:
      Tags:
      - Key: Environment
        Value:
          Ref: Environment
      - Key: Name
        Value: dap-cross-account-route-table
      VpcId:
        Ref: CrossAccountVPC
    Metadata:
      SamResourceId: CrossAccountRouteTable
  CrossAccountRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProduction
    Properties:
      RouteTableId:
        Ref: CrossAccountRouteTable
      SubnetId:
        Ref: CrossAccountSubnet1
    Metadata:
      SamResourceId: CrossAccountRouteTableAssociation1
  CrossAccountRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProduction
    Properties:
      RouteTableId:
        Ref: CrossAccountRouteTable
      SubnetId:
        Ref: CrossAccountSubnet2
    Metadata:
      SamResourceId: CrossAccountRouteTableAssociation2
  CrossAccountRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProduction
    Properties:
      RouteTableId:
        Ref: CrossAccountRouteTable
      SubnetId:
        Ref: CrossAccountSubnet3
    Metadata:
      SamResourceId: CrossAccountRouteTableAssociation3
  CrossAccountSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProduction
    Properties:
      GroupName: cross-account-security-group
      GroupDescription: Security group for the cross account VPC
      VpcId:
        Ref: CrossAccountVPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: '0.0.0.0/0'
        Description: Allow ingress from anywhere within the VPC on 443
      SecurityGroupEgress:
      - IpProtocol: -1
        FromPort: -1
        ToPort: -1
        CidrIp: '0.0.0.0/0'
        Description: Allow egress to anywhere
    Metadata:
      SamResourceId: CrossAccountSecurityGroup
  CrossAccountVPCEndpointSQS:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsProduction
    Properties:
      VpcEndpointType: Interface
      ServiceName: com.amazonaws.eu-west-2.sqs
      VpcId:
        Ref: CrossAccountVPC
      PrivateDnsEnabled: true
      SecurityGroupIds:
      - Ref: CrossAccountSecurityGroup
      SubnetIds:
      - Ref: CrossAccountSubnet1
      - Ref: CrossAccountSubnet2
      - Ref: CrossAccountSubnet3
    Metadata:
      SamResourceId: CrossAccountVPCEndpointSQS
  CrossAccountVPCEndpointS3:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsProduction
    Properties:
      VpcEndpointType: Gateway
      ServiceName: com.amazonaws.eu-west-2.s3
      VpcId:
        Ref: CrossAccountVPC
      RouteTableIds:
      - Ref: CrossAccountRouteTable
    Metadata:
      SamResourceId: CrossAccountVPCEndpointS3
  CrossAccountDataSyncRole:
    Type: AWS::IAM::Role
    Condition: IsProduction
    Properties:
      RoleName:
        Ref: CrossAccountDataSyncRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      MaxSessionDuration: 3600
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
      - PolicyName: dap-cross-account-data-sync-policy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: sqs:SendMessage
            Resource:
            - Fn::Sub: arn:aws:sqs:eu-west-2:*:staging-placeholder-txma-event-queue
            - Fn::Sub: arn:aws:sqs:eu-west-2:*:production-preview-placeholder-txma-event-queue
          - Effect: Allow
            Action:
            - kms:Decrypt
            - kms:Encrypt
            - kms:DescribeKey
            - kms:GenerateDataKey
            Resource: '*'
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:ListBucket
            Resource:
            - Fn::Sub: arn:aws:s3:::${RawLayerBucket}
            - Fn::Sub: arn:aws:s3:::${RawLayerBucket}/*
    Metadata:
      SamResourceId: CrossAccountDataSyncRole
  CrossAccountDataSyncLambda:
    Type: AWS::Serverless::Function
    Condition: IsProduction
    Properties:
      FunctionName: cross-account-transfer
      Handler: cross-account-transfer.handler
      Role:
        Fn::GetAtt:
        - CrossAccountDataSyncRole
        - Arn
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          ENVIRONMENT:
            Ref: Environment
          RAW_BUCKET_NAME:
            Ref: RawLayerBucket
      Tags:
        Environment:
          Ref: Environment
      MemorySize: 512
      Timeout: 900
      VpcConfig:
        SecurityGroupIds:
        - Ref: CrossAccountSecurityGroup
        SubnetIds:
        - Ref: CrossAccountSubnet1
        - Ref: CrossAccountSubnet2
        - Ref: CrossAccountSubnet3
      CodeUri: s3://secure-pipelines-pipelin-githubartifactsourcebuck-i3f1tk1mewia/cd9ae21a8e99751113af879985ccfdaf.zip/signed_634f7251-f43c-45de-9cc6-ac59a5b5ba14.zip
    Metadata:
      SamResourceId: CrossAccountDataSyncLambda
  EventConsumerQueue:
    Type: AWS::SQS::Queue
    Condition: UsePlaceholderTxMAQueue
    Properties:
      QueueName:
        Fn::Sub: ${Environment}-placeholder-txma-event-queue
      KmsMasterKeyId:
        Fn::GetAtt:
        - KmsKey
        - Arn
    Metadata:
      SamResourceId: EventConsumerQueue
  EventConsumerQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: IsCrossAccountDataSyncEnvironment
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: __owner_statement
          Effect: Allow
          Action: sqs:*
          Resource:
            Fn::GetAtt:
            - EventConsumerQueue
            - Arn
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
        - Sid: __sender_statement
          Effect: Allow
          Action: sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - EventConsumerQueue
            - Arn
          Principal:
            AWS: '{{resolve:ssm:CrossAccountDataSyncRoleARN}}'
      Queues:
      - Ref: EventConsumerQueue
    Metadata:
      SamResourceId: EventConsumerQueuePolicy
  EventConsumerLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: txma-event-consumer
      Events:
        CleanEvent:
          Type: SQS
          Properties:
            BatchSize: 1
            Queue:
              Fn::If:
              - UsePlaceholderTxMAQueue
              - Fn::GetAtt:
                - EventConsumerQueue
                - Arn
              - '{{resolve:ssm:TxMAEventQueueARN}}'
            FunctionResponseTypes:
            - ReportBatchItemFailures
      Handler: txma-event-consumer.handler
      Policies:
      - AWSLambdaBasicExecutionRole
      - Statement:
        - Effect: Allow
          Action:
          - sqs:DeleteMessage
          - sqs:GetQueueAttributes
          - sqs:ReceiveMessage
          Resource:
            Fn::If:
            - UsePlaceholderTxMAQueue
            - Fn::GetAtt:
              - EventConsumerQueue
              - Arn
            - '{{resolve:ssm:TxMAEventQueueARN}}'
        - Effect: Allow
          Action: firehose:PutRecord
          Resource:
            Fn::GetAtt:
            - KinesisFirehose
            - Arn
        - Effect: Allow
          Action: kms:decrypt
          Resource:
            Fn::If:
            - UsePlaceholderTxMAQueue
            - Fn::GetAtt:
              - KmsKey
              - Arn
            - '{{resolve:ssm:TxMAKMSKeyARN}}'
        - Fn::If:
          - IsProductionPreview
          - Effect: Allow
            Action:
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:ReceiveMessage
            Resource: '{{resolve:ssm:TxMAEventQueueARN}}'
          - Ref: AWS::NoValue
        - Fn::If:
          - IsProductionPreview
          - Effect: Allow
            Action: kms:decrypt
            Resource: '{{resolve:ssm:TxMAKMSKeyARN}}'
          - Ref: AWS::NoValue
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          FIREHOSE_STREAM_NAME:
            Fn::Sub: ${Environment}-${DeliveryStreamName}
          ENVIRONMENT:
            Ref: Environment
      Tags:
        Environment:
          Ref: Environment
      VpcConfig:
        SecurityGroupIds:
        - Ref: LambdaSecurityGroup
        SubnetIds:
        - Ref: SubnetForDAP1
        - Ref: SubnetForDAP2
        - Ref: SubnetForDAP3
      CodeUri: s3://secure-pipelines-pipelin-githubartifactsourcebuck-i3f1tk1mewia/cd9ae21a8e99751113af879985ccfdaf.zip/signed_e9f14d5f-3fe6-46f0-a908-e1572b7b877b.zip
    Metadata:
      SamResourceId: EventConsumerLambda
  KinesisFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName:
        Fn::Sub: ${Environment}-${DeliveryStreamName}
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN:
          Fn::GetAtt:
          - RawLayerBucket
          - Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName:
            Fn::Sub: ${Environment}-${DeliveryStreamName}
          LogStreamName:
            Fn::Sub: ${Environment}-${DeliveryStreamName}
        BufferingHints:
          IntervalInSeconds:
            Fn::If:
            - IsDev
            - 60
            - Fn::If:
              - UsePlaceholderTxMAQueue
              - 60
              - 900
          SizeInMBs: 128
        RoleARN:
          Fn::GetAtt:
          - IAMRoleKinesisFirehose
          - Arn
        Prefix: '!{partitionKeyFromQuery:datasource}/!{partitionKeyFromQuery:event_name}/year=!{partitionKeyFromQuery:year}/month=!{partitionKeyFromQuery:month}/day=!{partitionKeyFromQuery:day}/'
        CompressionFormat: GZIP
        ErrorOutputPrefix: kinesis-processing-errors-
        DynamicPartitioningConfiguration:
          Enabled: true
        ProcessingConfiguration:
          Enabled: true
          Processors:
          - Type: AppendDelimiterToRecord
          - Type: MetadataExtraction
            Parameters:
            - ParameterName: MetadataExtractionQuery
              ParameterValue: '{datasource: "txma",event_name: .event_name,year:now
                | strftime("%Y"),month:now | strftime("%m"),day:now | strftime("%d")}'
            - ParameterName: JsonParsingEngine
              ParameterValue: JQ-1.6
        DataFormatConversionConfiguration:
          Enabled: false
    Metadata:
      SamResourceId: KinesisFirehose
  IAMRoleKinesisFirehose:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: ${Environment}-kinesis-txma-firehose-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: firehose.amazonaws.com
          Action: sts:AssumeRole
      MaxSessionDuration: 3600
      Policies:
      - PolicyName:
          Fn::Sub: ${Environment}-kinesis-txma-firehose-policy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:AbortMultipartUpload
            - s3:GetBucketLocation
            - s3:GetObject
            - s3:ListBucket
            - s3:ListBucketMultipartUploads
            - s3:PutObject
            Resource:
            - Fn::Sub: arn:aws:s3:::${RawLayerBucket}
            - Fn::Sub: arn:aws:s3:::${RawLayerBucket}/*
          - Effect: Allow
            Resource: arn:aws:logs:*:*:*
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
    Metadata:
      SamResourceId: IAMRoleKinesisFirehose
  GlobalLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketName:
        Fn::Sub: ${Environment}-dap-s3-logs
      PublicAccessBlockConfiguration:
