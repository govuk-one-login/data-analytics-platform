          Action: s3:*
          Resource:
            Fn::Sub: ${RawLayerBucket.Arn}/*
          Principal: '*'
          Condition:
            Bool:
              aws:SecureTransport: false
        - Effect: Allow
          Action:
          - s3:GetObject
          - s3:PutObject
          - s3:ListBucket
          Resource:
          - Fn::Sub: ${RawLayerBucket.Arn}
          - Fn::Sub: ${RawLayerBucket.Arn}/*
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
    Metadata:
      SamResourceId: RawLayerBucketPolicy
