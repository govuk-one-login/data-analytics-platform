  RawLayerSingleTableCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: txma_raw_layer_events_schema_combined
      Role:
        Fn::GetAtt:
        - RawGlueCrawlerRole
        - Arn
      Targets:
        S3Targets:
        - Path:
            Fn::Sub: s3://${RawLayerBucket}/txma/
      DatabaseName:
        Ref: RawGlueDatabase
      CrawlerSecurityConfiguration:
        Ref: GlueSecurityConfig
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_EVERYTHING
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DELETE_FROM_DATABASE
      Configuration: '{"Version":1,"CrawlerOutput":{"Partitions":{"AddOrUpdateBehavior":"InheritFromTable"}},
        "Grouping": {"TableGroupingPolicy": "CombineCompatibleSchemas"}}'
    Metadata:
      SamResourceId: RawLayerSingleTableCrawler
  SplunkRawLayerSingleTableCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: splunk_migrated_data_fixed_schema
      Role:
        Fn::GetAtt:
        - RawGlueCrawlerRole
        - Arn
      Targets:
        CatalogTargets:
        - DatabaseName:
            Ref: RawGlueDatabase
          Tables:
          - Ref: SplunkMigrationGlueTable
      DatabaseName:
        Ref: RawGlueDatabase
      CrawlerSecurityConfiguration:
        Ref: GlueSecurityConfig
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_EVERYTHING
      SchemaChangePolicy:
        UpdateBehavior: LOG
        DeleteBehavior: LOG
      Configuration: '{"Version":1,"CrawlerOutput":{"Partitions":{"AddOrUpdateBehavior":"InheritFromTable"}},
        "Grouping": {"TableGroupingPolicy": "CombineCompatibleSchemas"}}'
    Metadata:
      SamResourceId: SplunkRawLayerSingleTableCrawler
  SplunkMigrationGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId:
        Fn::Sub: ${AWS::AccountId}
      DatabaseName:
        Ref: RawGlueDatabase
      TableInput:
        Name: splunk_migration
        TableType: EXTERNAL_TABLE
        PartitionKeys:
        - Name: year
          Type: string
        - Name: month
          Type: string
        - Name: day
          Type: string
        StorageDescriptor:
          Columns:
          - Name: event_id
            Type: string
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          Location:
            Fn::Sub: s3://${RawLayerBucket}/splunk/
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            Parameters:
              serialiazation.format: 1
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
    Metadata:
      SamResourceId: SplunkMigrationGlueTable
