          Action: s3:*
          Resource:
            Fn::Sub: ${SustainabilityBucket.Arn}/*
          Principal: '*'
          Condition:
            Bool:
              aws:SecureTransport: false
        - Effect: Allow
          Action:
          - s3:PutObject
          - s3:GetBucketLocation
          - s3:ListBucket
          Resource:
          - Fn::Sub: ${SustainabilityBucket.Arn}
          - Fn::Sub: ${SustainabilityBucket.Arn}/*
          Principal:
            AWS:
              Fn::GetAtt:
              - IAMRoleRedshiftServerless
              - Arn
    Metadata:
      SamResourceId: SustainabilityBucketPolicy
